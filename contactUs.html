<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Visualizer - Contact Us</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 40px;
        }
        input, textarea {
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: white;
            width: 100%;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-orange);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(243, 115, 53, 0.1);
        }
        textarea { height: 150px; resize: vertical; }
        
        .send-btn {
            padding: 18px;
            background: var(--primary-orange);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .send-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(243, 115, 53, 0.3);
        }
    </style>
</head>
<body>
    <nav>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="ASort.html">About Sorting</a></li>

            <li><a href="contactUs.html">Contact Us</a></li>
        </ul>
    </nav>

    <div id="box" style="max-width: 700px;">
        <h1>Contact Us</h1>
        <p style="color: var(--text-muted); margin-bottom: 20px;">
            Have questions or feedback? We'd love to hear from you!
        </p>
        
        <!-- ✅ UPDATED FORM -->
        <form id="contact-form">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message" required></textarea>
            <button type="submit" class="send-btn">Send Message</button>
        </form>
    </div>

    <footer>
        <div class="footer-container">
            <div class="footer-col">
                <h4>SORT VISUALIZER</h4>
                <ul>
                    <li>Vipul Raj</li>
                </ul>
            </div>
            <div class="footer-col">
                <h4>Contacts:</h4>
                <ul>
                    <li><a href="mailto:vipulraj04587@gmail.com">vipulraj04587@gmail.com</a></li>
                </ul>
            </div>
            <div class="footer-col">
                <h4>Reference:</h4>
                <ul>

                    </li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
    emailjs.init("pMA8x6fQgXq7lAjGp");
})();

document.getElementById("contact-form").addEventListener("submit", function(e) {
    e.preventDefault();

    emailjs.sendForm("service_cal6hq9", "template_ek2uxnb", this)
    .then(function() {
        alert("Message sent successfully");
        document.getElementById("contact-form").reset();
    }, function(error) {
        alert("Failed to send");
        console.log(error);
    });
});
</script>
    <script src="ai-assistant.js"></script>

</html>
